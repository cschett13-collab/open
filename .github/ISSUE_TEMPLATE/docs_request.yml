name: Documentation Request
description: Request documentation improvements.
title: "[Docs]: "
labels: ["type:docs", "status:needs-info"]
body:
  - type: textarea
    id: gap
    attributes:
      label: Documentation gap
      description: What is unclear, missing, or hard to find?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: What change would make this easier to understand?
    validations:
      required: true
