name: Bug Report
description: Report a reproducible problem.
title: "[Bug]: "
labels: ["type:bug", "status:needs-info"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Clear summary of the bug and expected behavior.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v20.x / v22.x / v24.x"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: "macOS, Linux, Windows, WSL"
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      description: Include logs or error output if available.
