# Tailscale deployment — joins YOUR tailnet and serves the app over HTTPS at
# https://alpha.<your-tailnet>.ts.net, reachable from any device you own, with a
# valid cert and zero port-forwarding. Nothing is exposed to the public internet.
#
#   1) Make an auth key:  https://login.tailscale.com/admin/settings/keys
#   2) Put TS_AUTHKEY=tskey-auth-... in .env
#   3) docker compose -f docker-compose.tailscale.yml up -d
#   4) On any device on your tailnet, open https://alpha.<tailnet>.ts.net
#      → Add to Home Screen → 🔔 Alerts (push works: it's real HTTPS)
#
# This replaces the Caddy stack (Tailscale provides the cert). The app + vLLM
# share the Tailscale network namespace so agents reach vLLM at 127.0.0.1:8000.

services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: alpha-tailscale
    hostname: alpha                      # becomes the MagicDNS name: alpha.<tailnet>.ts.net
    environment:
      TS_AUTHKEY: ${TS_AUTHKEY:?set TS_AUTHKEY in your .env}
      TS_STATE_DIR: /var/lib/tailscale
      TS_SERVE_CONFIG: /config/serve.json
      TS_EXTRA_ARGS: --ssh
    volumes:
      - tailscale-state:/var/lib/tailscale
      - ./tailscale-serve.json:/config/serve.json:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped

  alpha:
    build: .
    container_name: alpha-terminal
    # Share the Tailscale network namespace so `tailscale serve` reaches the app
    # on 127.0.0.1:8787 and the app is only addressable via the tailnet.
    network_mode: service:tailscale
    depends_on:
      - tailscale
      - vllm
    environment:
      PORT: "8787"
      ALPHA_BAR: "5m"
      ALPHA_TOP: "60"
      ALPHA_STOCKS: "on"
      ALPHA_PUSH: "on"
      ALPHA_AI: "${ALPHA_AI:-vllm}"
      ALPHA_AI_URL: "http://127.0.0.1:8000/v1/chat/completions"
      ALPHA_AI_MODEL: "${ALPHA_AI_MODEL:-meta-llama/Meta-Llama-3.1-8B-Instruct}"
    restart: unless-stopped

  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    # Same network namespace as the app → reach vLLM at 127.0.0.1:8000
    network_mode: service:tailscale
    depends_on:
      - tailscale
    restart: unless-stopped
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - vllm-models:/root/.cache/huggingface
    command:
      - "--model"
      - "${ALPHA_AI_MODEL:-meta-llama/Meta-Llama-3.1-8B-Instruct}"
      - "--host"
      - "127.0.0.1"
      - "--port"
      - "8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  tailscale-state:
  vllm-models:
