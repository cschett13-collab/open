# Run Alpha Terminal on your NAS / home server, with your RTX 5090 powering
# local AI desk agents via vLLM (OpenAI-compatible API).
#
#   docker compose up -d
#   open http://<nas-ip>:8787  on your phone or PC
#
# The 5090 doesn't fetch market data (the internet does) — it accelerates the
# local LLM that writes briefings / alert context / away digests.
# Set ALPHA_AI=off below to skip AI (you can remove the vllm service too).

services:
  caddy:
    image: caddy:2
    container_name: alpha-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Set ALPHA_DOMAIN in a .env file. Defaults to localhost (self-signed cert).
      ALPHA_DOMAIN: ${ALPHA_DOMAIN:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - alpha

  alpha:
    build: .
    # Or pull a prebuilt image instead of building:
    # image: ghcr.io/<you>/alpha-terminal:latest
    container_name: alpha-terminal
    restart: unless-stopped
    expose:
      - "8787"          # internal: reached via the caddy proxy over HTTPS
    ports:
      - "8787:8787"     # optional: direct HTTP access on the LAN (remove if undesired)
    environment:
      PORT: "8787"
      ALPHA_BAR: "5m"
      ALPHA_TOP: "60"
      ALPHA_STOCKS: "on"
      # --- local AI desk agents (served by the vllm service below, on your 5090) ---
      ALPHA_AI: "vllm"
      ALPHA_AI_URL: "http://vllm:8000/v1/chat/completions"
      ALPHA_AI_MODEL: "${ALPHA_AI_MODEL:-meta-llama/Meta-Llama-3.1-8B-Instruct}"
      # ALPHA_AI_DIGEST_MS: "3600000"   # optional hourly away digest
    volumes:
      - alpha-data:/app/.data
    depends_on:
      vllm:
        condition: service_healthy

  vllm:
    # Official vLLM OpenAI-compatible server. Pin/retag as you like.
    image: vllm/vllm-openai:latest
    container_name: vllm
    restart: unless-stopped
    ports:
      - "8000:8000"      # remove to keep the model private to the compose network
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      - vllm-models:/root/.cache/huggingface
    command:
      - "--model"
      - "${ALPHA_AI_MODEL:-meta-llama/Meta-Llama-3.1-8B-Instruct}"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/v1/models', timeout=5)",
        ]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 180s
    # --- RTX 5090 passthrough (needs NVIDIA Container Toolkit on the host) ---
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  alpha-data:
  vllm-models:
  caddy-data:
  caddy-config:
