# Self-hosted RustDesk server stack — run this ON THE NAS.
#
# RustDesk is an open-source remote-desktop tool (TeamViewer-style). It needs
# two small server components, which you host yourself so nothing touches a
# third party:
#   - hbbs (ID/rendezvous server) : brokers connections, holds device IDs
#   - hbbr (relay server)         : relays the stream when a direct P2P path
#                                   can't be made
#
# On a tailnet, clients usually connect peer-to-peer and the relay is rarely
# used — but it's here for the cases where it's needed.
#
# Deploy:
#   1. Copy this folder to the NAS (e.g. /volume1/docker/rustdesk).
#   2. cp .env.example .env  and edit.
#   3. docker compose up -d           (or import via the UGOS Container UI)
#   4. First start generates a key at ${DATA_ROOT}/id_ed25519.pub — you'll paste
#      its contents into each client (see README).
#
# Reachability: point clients at the NAS's MagicDNS name `nas`. Because the NAS
# is on your tailnet, the server is private to your devices. Do NOT forward
# these ports to the internet.

services:
  hbbs:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbs
    command: hbbs -r ${RELAY_HOST}:21117
    environment:
      - TZ=${TZ}
    volumes:
      - ${DATA_ROOT}:/root
    ports:
      - "21115:21115"        # hbbs: NAT type test (tcp)
      - "21116:21116"        # hbbs: ID registration / hole punching (tcp)
      - "21116:21116/udp"    # hbbs: heartbeat / registration (udp)
      - "21118:21118"        # hbbs: web client support (tcp, optional)
    depends_on:
      - hbbr
    restart: unless-stopped

  hbbr:
    image: rustdesk/rustdesk-server:latest
    container_name: rustdesk-hbbr
    command: hbbr
    environment:
      - TZ=${TZ}
    volumes:
      - ${DATA_ROOT}:/root
    ports:
      - "21117:21117"        # hbbr: relay (tcp)
      - "21119:21119"        # hbbr: web client relay (tcp, optional)
    restart: unless-stopped
