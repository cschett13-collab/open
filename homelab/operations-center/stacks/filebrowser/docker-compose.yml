# FileBrowser — web file manager for a directory tree.  Reach at http://nas:8081
#
# Deploy on the NAS:
#   cd filebrowser && docker compose up -d
# Default login is  admin / admin  on first run — CHANGE IT immediately in
# Settings → User Management. Point the srv mount at the tree you want to browse.
# Tailnet-only; don't expose port 8081.

services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      # EDIT this to the directory you want to manage:
      - /volume1:/srv
      - ./database.db:/database.db
      - ./settings.json:/.filebrowser.json
    ports:
      - "8081:80"
    restart: unless-stopped
