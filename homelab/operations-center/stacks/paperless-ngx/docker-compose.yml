# Paperless-ngx — scan, OCR, tag & search documents.  Reach at http://nas:8085
#
# Deploy on the NAS:
#   cd paperless-ngx && cp .env.example .env && $EDITOR .env   # set the secrets
#   docker compose up -d
# First start runs migrations (give it a minute), then open http://nas:8085 and
# log in with the superuser from .env. Drop files into ./consume to import them.
# Tailnet-only; don't expose port 8085.

services:
  broker:
    image: redis:7-alpine
    container_name: paperless-redis
    volumes:
      - ./redisdata:/data
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: paperless-db
    environment:
      - POSTGRES_DB=paperless
      - POSTGRES_USER=paperless
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    depends_on:
      - db
      - broker
    environment:
      - PAPERLESS_REDIS=redis://broker:6379
      - PAPERLESS_DBHOST=db
      - PAPERLESS_DBPASS=${POSTGRES_PASSWORD}
      - PAPERLESS_SECRET_KEY=${PAPERLESS_SECRET_KEY}
      - PAPERLESS_URL=${PAPERLESS_URL:-http://nas:8085}
      - PAPERLESS_TIME_ZONE=${TZ:-America/New_York}
      - PAPERLESS_OCR_LANGUAGE=eng
      - PAPERLESS_ADMIN_USER=${PAPERLESS_ADMIN_USER}
      - PAPERLESS_ADMIN_PASSWORD=${PAPERLESS_ADMIN_PASSWORD}
    volumes:
      - ./data:/usr/src/paperless/data
      - ./media:/usr/src/paperless/media
      - ./export:/usr/src/paperless/export
      - ./consume:/usr/src/paperless/consume
    ports:
      - "8085:8000"
    restart: unless-stopped
