# Immich — self-hosted photos with ML search & mobile apps.  Reach at http://nas:2283
#
# Deploy on the NAS:
#   cd immich && cp .env.example .env && $EDITOR .env   # set DB_PASSWORD, paths
#   docker compose up -d
# First start initializes the database (give it a couple of minutes), then open
# http://nas:2283 and create the admin account. Point the mobile app at
# http://nas:2283 with Tailscale running. Tailnet-only; don't expose port 2283.

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: immich-server
    env_file: .env
    volumes:
      - ${UPLOAD_LOCATION}:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "2283:2283"
    depends_on:
      - redis
      - database
    restart: unless-stopped

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:release
    container_name: immich-ml
    env_file: .env
    volumes:
      - model-cache:/cache
    restart: unless-stopped

  redis:
    image: docker.io/valkey/valkey:8-bookworm
    container_name: immich-redis
    restart: unless-stopped

  database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: immich-db
    environment:
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_DB=${DB_DATABASE_NAME}
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  model-cache:
