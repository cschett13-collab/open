# Homepage services — https://gethomepage.dev/configs/services/
#
# Tiles are grouped. These are pre-wired to this kit; replace hosts/ports with
# your real ones and delete what you don't run. `href` uses the MagicDNS name
# `nas` so links work from any tailnet device.

- Remote Access:
    - Tailscale Admin:
        icon: tailscale.png
        href: https://login.tailscale.com/admin/machines
        description: Tailnet devices, ACLs, DNS
    - RustDesk Server:
        icon: rustdesk.png
        href: http://nas:21118
        description: Self-hosted remote-desktop relay
    - Remote Desktop (PC):
        icon: mdi-remote-desktop
        href: rdp://pc:3389
        description: RDP into the PC (../../remote-desktop/rdp)
    - Cockpit (PC):
        icon: cockpit.png
        href: https://pc:9090
        description: Web console — services, logs, terminal

